<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvelStudio - Tableau de bord</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>

<body>
  <main class="dashboard">
    <header class="dashboard-header">
      <div>
        <h1>AvelStudio</h1>
        <p>Tableau de bord des aventures</p>
      </div>

      <button id="logoutBtn" class="secondary-btn">Déconnexion</button>
    </header>

    <section class="actions">
      <button id="newAdventureBtn" class="primary-btn">
        + Nouvelle aventure
      </button>
    </section>

    <p id="message" class="message"></p>

    <section id="adventuresList" class="adventures-list">
      Chargement...
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
