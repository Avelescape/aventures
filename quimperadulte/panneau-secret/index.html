<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#17110d">

  <title>Le panneau secret</title>

  <style>
    :root {
      /*
        POSITION DU PANNEAU DANS L’IMAGE COMPLÈTE
        Valeurs prévues pour l’image fournie.
      */
      --panneau-x: 17%;
      --panneau-y: 16.2%;
      --panneau-largeur: 34.7%;
      --panneau-hauteur: 36%;

      /*
        POSITION DE LA VIS INFÉRIEURE GAUCHE
        dans l’image panneau.webp.
      */
      --pivot-x: 8%;
      --pivot-y: 95%;

      /* Réglages de l’animation */
      --angle-ouverture: -105deg;
      --duree-ouverture: 1400ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow: hidden;

      background: #17110d;

      font-family: Georgia, "Times New Roman", serif;

      user-select: none;
      -webkit-user-select: none;

      touch-action: manipulation;
    }

    /*
      La scène conserve le format vertical 3/4
      de ton image 1536 × 2048 px.
    */
    .scene {
      position: relative;

      width: min(100vw, calc(100svh * 0.75));
      aspect-ratio: 3 / 4;

      overflow: hidden;
      background: #30251d;

      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Image complète du mur */
    .mur {
      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;

      display: block;
      object-fit: cover;

      pointer-events: none;
    }

    /*
      Zone placée exactement à l’endroit
      où se trouve le panneau.
    */
    .mecanisme {
      position: absolute;

      left: var(--panneau-x);
      top: var(--panneau-y);

      width: var(--panneau-largeur);
      height: var(--panneau-hauteur);

      pointer-events: none;
    }

    /* Cavité cachant le panneau présent sur l’image du mur */
    .cavite {
      position: absolute;
      inset: 0;
      z-index: 1;

      width: 100%;
      height: 100%;

      display: block;
      object-fit: cover;

      opacity: 0;
      transform: scale(0.96);

      filter:
        brightness(0.7)
        contrast(1.12);

      transition:
        opacity 500ms ease 250ms,
        transform 900ms ease 200ms;
    }

    /* Ombre intérieure de la cavité */
    .ombre-cavite {
      position: absolute;
      inset: 0;
      z-index: 2;

      opacity: 0;

      box-shadow:
        inset 0 0 28px rgba(0, 0, 0, 0.95),
        inset 0 12px 20px rgba(0, 0, 0, 0.7),
        inset 10px 0 16px rgba(0, 0, 0, 0.55);

      transition: opacity 500ms ease 300ms;
    }

    /* Panneau indépendant */
    .panneau {
      position: absolute;
      inset: 0;
      z-index: 4;

      width: 100%;
      height: 100%;

      display: block;
      object-fit: fill;

      /*
        Le panneau tourne autour de la vis
        située en bas à gauche.
      */
      transform-origin: var(--pivot-x) var(--pivot-y);
      transform: rotate(0deg);

      transition:
        transform var(--duree-ouverture)
        cubic-bezier(0.22, 0.8, 0.25, 1);

      filter:
        drop-shadow(3px 5px 4px rgba(0, 0, 0, 0.35));

      will-change: transform;
    }

    /*
      Vis fixe affichée par-dessus le panneau.
      Elle ne tourne pas avec celui-ci.
    */
    .vis-pivot {
      position: absolute;
      z-index: 8;

      left: var(--pivot-x);
      top: var(--pivot-y);

      width: clamp(10px, 1.4vw, 18px);
      aspect-ratio: 1;

      transform: translate(-50%, -50%);

      border: 1px solid #4c3828;
      border-radius: 50%;

      background:
        linear-gradient(
          45deg,
          transparent 42%,
          #3f2d20 43%,
          #3f2d20 55%,
          transparent 56%
        ),
        radial-gradient(
          circle at 35% 30%,
          #d6bd9d 0%,
          #927052 35%,
          #4c3728 72%,
          #241810 100%
        );

      box-shadow:
        1px 2px 3px rgba(0, 0, 0, 0.75);
    }

    /* Message invitant à toucher l’écran */
    .indication {
      position: absolute;
      z-index: 20;

      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));

      transform: translateX(-50%);

      width: max-content;
      max-width: calc(100% - 32px);

      margin: 0;
      padding: 10px 16px;

      color: #f5efe0;
      background: rgba(23, 17, 13, 0.82);

      border: 1px solid rgba(245, 239, 224, 0.45);
      border-radius: 999px;

      text-align: center;
      font-size: clamp(14px, 3.6vw, 18px);

      backdrop-filter: blur(4px);

      transition:
        opacity 350ms ease,
        transform 350ms ease;

      pointer-events: none;
    }

    /* État ouvert */
    .scene.ouverte .panneau {
      transform: rotate(var(--angle-ouverture));

      filter:
        drop-shadow(16px 15px 9px rgba(0, 0, 0, 0.55));
    }

    .scene.ouverte .cavite {
      opacity: 1;
      transform: scale(1);
    }

    .scene.ouverte .ombre-cavite {
      opacity: 1;
    }

    .scene.ouverte .indication {
      opacity: 0;
      transform: translate(-50%, 12px);
    }

    /*
      Petite oscillation à la fin de l’ouverture,
      comme un panneau suspendu à une seule vis.
    */
    .scene.ouverte .panneau {
      animation:
        balancement 900ms ease-in-out
        var(--duree-ouverture) 1;
    }

    @keyframes balancement {
      0% {
        transform: rotate(var(--angle-ouverture));
      }

      30% {
        transform: rotate(-99deg);
      }

      58% {
        transform: rotate(-108deg);
      }

      78% {
        transform: rotate(-103deg);
      }

      100% {
        transform: rotate(var(--angle-ouverture));
      }
    }

    /* Respect du réglage d’accessibilité du téléphone */
    @media (prefers-reduced-motion: reduce) {
      .panneau,
      .cavite,
      .ombre-cavite,
      .indication {
        transition-duration: 1ms;
        animation: none !important;
      }
    }
  </style>
</head>

<body>

  <main
    class="scene"
    id="scene"
    role="button"
    tabindex="0"
    aria-label="Toucher pour faire pivoter le panneau"
    aria-pressed="false"
  >

    <!-- Image complète du mur -->
    <img
      class="mur"
      src="images/mur.webp"
      alt=""
      draggable="false"
    >

    <div class="mecanisme">

      <!-- Image de la cavité -->
      <img
        class="cavite"
        src="images/cavite.webp"
        alt="Une cavité cachée derrière le panneau"
        draggable="false"
      >

      <div class="ombre-cavite"></div>

      <!-- Panneau détouré -->
      <img
        class="panneau"
        src="images/panneau.webp"
        alt=""
        draggable="false"
      >

      <!-- Vis inférieure gauche restant immobile -->
      <span class="vis-pivot" aria-hidden="true"></span>

    </div>

    <p class="indication">
      Touchez l’écran
    </p>

  </main>

  <script>
    const scene = document.getElementById("scene");

    let animationEnCours = false;

    function basculerPanneau() {
      if (animationEnCours) {
        return;
      }

      animationEnCours = true;

      const estOuvert = scene.classList.toggle("ouverte");

      scene.setAttribute(
        "aria-pressed",
        estOuvert ? "true" : "false"
      );

      /*
        Petite vibration sur les téléphones compatibles.
      */
      if ("vibrate" in navigator) {
        navigator.vibrate(estOuvert ? [40, 35, 70] : 40);
      }

      window.setTimeout(() => {
        animationEnCours = false;
      }, 1500);
    }

    scene.addEventListener("pointerup", basculerPanneau);

    scene.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        basculerPanneau();
      }
    });

    /*
      Empêche le navigateur de déplacer l’image
      lors d’un glissement du doigt.
    */
    scene.addEventListener("dragstart", (event) => {
      event.preventDefault();
    });
  </script>

</body>
</html>
