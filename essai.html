<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AvelEscape - Mécanisme</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: manipulation;
    font-family: Arial, sans-serif;
}

.scene {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
}

/* CADRE FIXE EN RATIO 1152 x 2048 */
.game {
    position: relative;
    width: min(100vw, calc(100vh * 1152 / 2048));
    aspect-ratio: 1152 / 2048;
    overflow: hidden;
}

/* IMAGE DE FOND CHANGEANTE */
.fond {
    position: absolute;
    inset: 0;
    background-image: url("https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpphareeteint.webp");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: center;
    z-index: 0;
}

/* ZONES CLIQUABLES */
.zones {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
}

.zone {
    fill: rgba(0, 170, 255, 0.18);
    stroke: rgba(255, 255, 255, 0.55);
    stroke-width: 4;
    cursor: pointer;
}

.zone:active {
    fill: rgba(255, 255, 255, 0.35);
}

/* ENGRENAGES */
.gear {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    z-index: 6;
    transform-origin: center center;
    pointer-events: none;
}

.gear-small {
    width: 13%;
    aspect-ratio: 1 / 1;
    background-image: url("https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpengrenage-1.webp");
}

.gear-big {
    width: 16%;
    aspect-ratio: 1 / 1;
    background-image: url("https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpengrenagegrand.webp");
}

/* POSITIONS DES ENGRENAGES */
#gearA { left: 36%; top: 50%; }
#gearB { left: 43%; top: 52%; }
#gearC { left: 54%; top: 50%; }
#gearD { left: 62%; top: 50%; }

/* ROTATION SI CODE BON */
.active #gearA,
.active #gearC {
    animation: rotateRight 6s linear infinite;
}

.active #gearB,
.active #gearD {
    animation: rotateLeft 6s linear infinite;
}

@keyframes rotateRight {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes rotateLeft {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
}

/* MESSAGE */
.message {
    position: absolute;
    left: 50%;
    bottom: 5%;
    transform: translateX(-50%);
    width: 80%;
    padding: 14px;
    background: rgba(0,0,0,0.75);
    color: white;
    text-align: center;
    border-radius: 12px;
    font-size: 18px;
    display: none;
    z-index: 10;
}

/* BOUTON RESET */
.reset {
    position: absolute;
    top: 2%;
    right: 4%;
    z-index: 10;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: rgba(0,0,0,0.65);
    color: white;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="scene">
    <div class="game" id="game">

        <div id="fond" class="fond"></div>

        <button class="reset" onclick="resetGame()">Réinitialiser</button>

        <div id="gearA" class="gear gear-small"></div>
        <div id="gearB" class="gear gear-big"></div>
        <div id="gearC" class="gear gear-small"></div>
        <div id="gearD" class="gear gear-big"></div>

        <svg class="zones" viewBox="0 0 1152 2048" preserveAspectRatio="none">

            <rect class="zone" x="370" y="800" width="130" height="150" rx="15" onclick="clickZone('A')" />
            <rect class="zone" x="520" y="800" width="130" height="150" rx="15" onclick="clickZone('B')" />
            <rect class="zone" x="680" y="800" width="130" height="150" rx="15" onclick="clickZone('C')" />
            <rect class="zone" x="850" y="800" width="130" height="150" rx="15" onclick="clickZone('D')" />

            <rect class="zone" x="450" y="1500" width="130" height="250" rx="15" onclick="clickZone('E')" />
            <rect class="zone" x="610" y="1400" width="130" height="380" rx="15" onclick="clickZone('F')" />
            <rect class="zone" x="770" y="1400" width="130" height="380" rx="15" onclick="clickZone('G')" />

        </svg>

        <div id="message" class="message"></div>

    </div>
</div>

<audio id="sonClic" preload="auto">
    <source src="ABCDEFG.mp3" type="audio/mpeg">
</audio>

<script>
const codeCorrect = ["D", "A", "B", "C", "G"];

const imageEteinte = "https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpphareeteint.webp";
const imageAllumee = "https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpphareallume.webp";
const imageFaisceau = "https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webppharefaisceau.webp";

let sequence = [];
let solved = false;
let phareInterval = null;
let faisceauTimeout = null;

function jouerClic() {
    const son = document.getElementById("sonClic");

    if (!son) return;

    son.pause();
    son.currentTime = 0;
    son.play().catch(() => {});
}

function clickZone(letter) {
    jouerClic();

    if (solved) return;

    sequence.push(letter);
    showMessage("Séquence : " + sequence.join(" "));

    for (let i = 0; i < sequence.length; i++) {
        if (sequence[i] !== codeCorrect[i]) {
            showMessage("Mauvais ordre. Le mécanisme se bloque.");
            sequence = [];
            return;
        }
    }

    if (sequence.length === codeCorrect.length) {
        success();
    }
}

function success() {
    solved = true;

    document.getElementById("game").classList.add("active");

    document.getElementById("fond").style.backgroundImage =
        `url("${imageAllumee}")`;

    showMessage("Code correct. Le phare s'allume.");

    clearInterval(phareInterval);
    clearTimeout(faisceauTimeout);

    // Faisceau toutes les 15 secondes
    phareInterval = setInterval(lancerFaisceau, 15000);
}

function lancerFaisceau() {
    if (!solved) return;

    document.getElementById("fond").style.backgroundImage =
        `url("${imageFaisceau}")`;

    clearTimeout(faisceauTimeout);

    faisceauTimeout = setTimeout(() => {
        if (solved) {
            document.getElementById("fond").style.backgroundImage =
                `url("${imageAllumee}")`;
        }
    }, 1000);
}

function resetGame() {
    sequence = [];
    solved = false;

    document.getElementById("game").classList.remove("active");

    clearInterval(phareInterval);
    clearTimeout(faisceauTimeout);
    phareInterval = null;
    faisceauTimeout = null;

    document.getElementById("fond").style.backgroundImage =
        `url("${imageEteinte}")`;

    showMessage("Mécanisme réinitialisé.");
}

function showMessage(text) {
    const message = document.getElementById("message");
    message.textContent = text;
    message.style.display = "block";
}
</script>

</body>
</html>
