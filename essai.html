<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mécanisme du phare</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100dvh;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.page {
  width: 100vw;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.scene {
  position: relative;
  width: min(100vw, calc(100dvh * 1152 / 2048));
  height: min(100dvh, calc(100vw * 2048 / 1152));
  overflow: hidden;
}

.fond {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: fill;
  display: block;
}

.zone {
  position: absolute;
  background: rgba(0,180,255,0.22);
  border: 2px solid rgba(255,255,255,0.55);
  border-radius: 8px;

  display: flex;
  justify-content: center;
  align-items: center;

  color: white;
  font-size: 24px;
  font-weight: bold;

  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
}

.zone:active {
  background: rgba(0,255,0,0.45);
  transform: scale(0.96);
}

/* BOUTONS A B C D */

#zoneA { left:29%; top:39%; width:8%; height:8%; }
#zoneB { left:40%; top:39%; width:8%; height:8%; }
#zoneC { left:51%; top:39%; width:8%; height:8%; }
#zoneD { left:62%; top:39%; width:8%; height:8%; }

/* POIDS E F G */

#zoneE { left:38%; top:73%; width:10%; height:18%; }
#zoneF { left:48%; top:70%; width:10%; height:21%; }
#zoneG { left:59%; top:67%; width:12%; height:24%; }

/* ENGRENAGE ANIMÉ */

#mecanisme {
  position: absolute;
  left: 42%;
  top: 51%;
  width: 22%;
  aspect-ratio: 1 / 1;

  border: 10px dashed #d6b56d;
  border-radius: 50%;

  display: none;
  pointer-events: none;
}

#mecanisme.active {
  display: block;
  animation: rotation 2s linear infinite;
}

@keyframes rotation {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* MESSAGE */

#message {
  position: absolute;
  bottom: 2%;
  left: 5%;
  width: 90%;
  padding: 8px 10px;

  text-align: center;
  color: white;
  font-size: 18px;

  background: rgba(0,0,0,0.55);
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="page">
  <div class="scene">

    <img 
      class="fond" 
      src="https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webppahreeteint.webp"
      alt="Mécanisme du phare"
    >

    <div class="zone" id="zoneA" onclick="clicZone('A')">A</div>
    <div class="zone" id="zoneB" onclick="clicZone('B')">B</div>
    <div class="zone" id="zoneC" onclick="clicZone('C')">C</div>
    <div class="zone" id="zoneD" onclick="clicZone('D')">D</div>

    <div class="zone" id="zoneE" onclick="clicZone('E')">E</div>
    <div class="zone" id="zoneF" onclick="clicZone('F')">F</div>
    <div class="zone" id="zoneG" onclick="clicZone('G')">G</div>

    <div id="mecanisme"></div>

    <div id="message">Touchez les éléments du mécanisme.</div>

  </div>
</div>

<script>
const bonCode = "DABCG";
let saisie = "";
let mecanismeLance = false;

function clicZone(lettre) {
  if (mecanismeLance) return;

  saisie += lettre;

  document.getElementById("message").textContent = "Séquence : " + saisie;

  if (!bonCode.startsWith(saisie)) {
    document.getElementById("message").textContent = "Mauvais ordre.";
    saisie = "";
    return;
  }

  if (saisie === bonCode) {
    lancerMecanisme();
  }
}

function lancerMecanisme() {
  mecanismeLance = true;
  document.getElementById("mecanisme").classList.add("active");
  document.getElementById("message").textContent = "Le mécanisme s’enclenche.";
}
</script>

</body>
</html>
