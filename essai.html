<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AvelEscape - Mécanisme</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: manipulation;
    font-family: Arial, sans-serif;
}

.scene {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
}

/* CADRE TOUJOURS EN 1152 x 2048 */
.game {
    position: relative;
    width: min(100vw, calc(100vh * 1152 / 2048));
    aspect-ratio: 1152 / 2048;
    background-image: url("https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webppahreeteint.webp");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: center;
    overflow: hidden;
}

/* SVG DES ZONES */
.zones {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

/* ZONES CLIQUABLES */
.zone {
    fill: rgba(0, 170, 255, 0.18);
    stroke: rgba(255, 255, 255, 0.55);
    stroke-width: 4;
    cursor: pointer;
}

.zone:active {
    fill: rgba(255, 255, 255, 0.35);
}

/* LETTRES */
.zone-text {
    fill: white;
    font-size: 52px;
    font-weight: bold;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
}

/* MESSAGE */
.message {
    position: absolute;
    left: 50%;
    bottom: 5%;
    transform: translateX(-50%);
    width: 80%;
    padding: 14px;
    background: rgba(0,0,0,0.75);
    color: white;
    text-align: center;
    border-radius: 12px;
    font-size: 18px;
    display: none;
}

/* ENGRENAGES */
.gear {
    position: absolute;
    width: 13%;
    aspect-ratio: 1 / 1;
    background-image: url("https://avelescape.wordpress.com/wp-content/uploads/2026/06/engrenage.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    display: none;
}

#gear1 {
    left: 38%;
    top: 56%;
}

#gear2 {
    left: 50%;
    top: 56%;
}

.active #gear1 {
    display: block;
    animation: rotateRight 2s linear infinite;
}

.active #gear2 {
    display: block;
    animation: rotateLeft 2s linear infinite;
}

@keyframes rotateRight {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes rotateLeft {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
}

/* BOUTON RESET */
.reset {
    position: absolute;
    top: 2%;
    right: 4%;
    z-index: 5;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: rgba(0,0,0,0.65);
    color: white;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="scene">
    <div class="game" id="game">

        <button class="reset" onclick="resetGame()">Réinitialiser</button>

        <!--  
        IMPORTANT :
        Toutes les coordonnées sont basées sur l'image 1152 x 2048.
        x = gauche/droite
        y = haut/bas
        width = largeur
        height = hauteur
        -->

        <svg class="zones" viewBox="0 0 1152 2048" preserveAspectRatio="none">

            <!-- A -->
            <rect class="zone" x="370" y="800" width="130" height="120" rx="15" onclick="clickZone('A')" />
            <text class="zone-text" x="365" y="840">A</text>

            <!-- B -->
            <rect class="zone" x="520" y="800" width="130" height="120" rx="15" onclick="clickZone('B')" />
            <text class="zone-text" x="525" y="840">B</text>

            <!-- C -->
            <rect class="zone" x="680" y="800" width="130" height="120" rx="15" onclick="clickZone('C')" />
            <text class="zone-text" x="685" y="840">C</text>

            <!-- D -->
            <rect class="zone" x="850" y="800" width="130" height="120" rx="15" onclick="clickZone('D')" />
            <text class="zone-text" x="845" y="840">D</text>

            <!-- E -->
            <rect class="zone" x="530" y="1050" width="130" height="120" rx="15" onclick="clickZone('E')" />
            <text class="zone-text" x="365" y="1010">E</text>

            <!-- F -->
            <rect class="zone" x="460" y="1050" width="130" height="120" rx="15" onclick="clickZone('F')" />
            <text class="zone-text" x="525" y="1010">F</text>

            <!-- G -->
            <rect class="zone" x="620" y="1050" width="130" height="120" rx="15" onclick="clickZone('G')" />
            <text class="zone-text" x="685" y="1010">G</text>

        </svg>

        <div id="gear1" class="gear"></div>
        <div id="gear2" class="gear"></div>

        <div id="message" class="message"></div>

    </div>
</div>

<script>
const codeCorrect = ["D", "A", "B", "C", "G"];
let sequence = [];
let solved = false;

function clickZone(letter) {
    if (solved) return;

    sequence.push(letter);

    showMessage("Séquence : " + sequence.join(" "));

    for (let i = 0; i < sequence.length; i++) {
        if (sequence[i] !== codeCorrect[i]) {
            showMessage("Mauvais ordre. Le mécanisme se bloque.");
            sequence = [];
            return;
        }
    }

    if (sequence.length === codeCorrect.length) {
        success();
    }
}

function success() {
    solved = true;
    document.getElementById("game").classList.add("active");
    showMessage("Code correct. Le mécanisme s'enclenche.");
}

function resetGame() {
    sequence = [];
    solved = false;
    document.getElementById("game").classList.remove("active");
    showMessage("Mécanisme réinitialisé.");
}

function showMessage(text) {
    const message = document.getElementById("message");
    message.textContent = text;
    message.style.display = "block";
}
</script>

</body>
</html>
