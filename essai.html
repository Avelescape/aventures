<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mécanisme du phare</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    /* Centre le jeu verticalement et horizontalement sur tous les écrans */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Le conteneur s'adapte à l'image sans jamais la déformer ni dépasser de l'écran */
.game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* L'image de fond sert de référence absolue pour la taille du jeu */
.bg-image {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    user-select: none;
    pointer-events: none;
}

/* La scène invisible se superpose PILE sur l'image affichée */
.scene {
    position: absolute;
    /* Ces dimensions magiques s'alignent sur l'image à l'intérieur du conteneur */
    width: 100%;
    height: 100%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    /* On force la scène à faire exactement la taille de l'image contenue */
    max-width: max-content;
}

/* Si l'écran est en mode portrait (mobile vertical) */
@media (orientation: portrait) {
    .scene {
        width: 100vw;
        height: calc(100vw * (9 / 16)); /* Remplacez 9/16 par le ratio de votre image si besoin (Hauteur/Largeur) */
    }
}
/* Si l'écran est en mode paysage */
@media (orientation: landscape) {
    .scene {
        height: 100vh;
        width: calc(100vh * (16 / 9)); /* Remplacez 16/9 par le ratio de votre image si besoin (Largeur/Hauteur) */
    }
}

/* ---------------- ZONES CLIQUABLES ---------------- */
.zone {
    position: absolute;
    background: rgba(0, 170, 255, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 4px;
    cursor: pointer;
    transition: .15s;
    touch-action: manipulation;
    z-index: 10;
}

.zone:active {
    background: rgba(89, 55, 14, 0.6);
    transform: scale(.95);
}

/* Positions d'origine conservées */
#zoneA { left: 45%; top: 39%; width: 2.9%; height: 8%; }
#zoneB { left: 49%; top: 39%; width: 2.8%; height: 8%; }
#zoneC { left: 52.5%; top: 39%; width: 2.8%; height: 8%; }
#zoneD { left: 56%; top: 39%; width: 2.8%; height: 8%; }
#zoneE { left: 47%; top: 72%; width: 3%; height: 15%; }
#zoneF { left: 50.5%; top: 72%; width: 3%; height: 15%; }
#zoneG { left: 54%; top: 68%; width: 3%; height: 20%; }

/* ---------------- ENGRENAGES ---------------- */
.engrenage {
    position: absolute;
    width: 6%; /* Taille relative à la largeur du jeu */
    height: auto;
    display: block;
    user-select: none;
    pointer-events: none;
    transform-origin: center center;
}

/* Positions ajustées en % pour coller au décor */
#engrenageA { left: 43.5%; top: 45%; }
#engrenageB { left: 46.5%; top: 49%; width: 8%; } 
#engrenageC { left: 50.5%; top: 45%; width: 8%; }
#engrenageD { left: 54%; top: 49%; }

/* ANIMATIONS */
.tourneDroite { animation: rotationDroite 4s linear infinite; }
.tourneGauche { animation: rotationGauche 4s linear infinite; }

@keyframes rotationDroite {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
@keyframes rotationGauche {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
}

/* ---------- Message ---------- */
#message {
    position: absolute;
    bottom: 5%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    text-shadow: 0 0 8px black;
    z-index: 20;
}
</style>
</head>
<body>

<div class="game-container">
    <img src="https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webppahreeteint.webp" class="bg-image" alt="Phare">
    
    <div class="scene">
        <div class="zone" id="zoneA" onclick="clicZone('A')"></div>
        <div class="zone" id="zoneB" onclick="clicZone('B')"></div>
        <div class="zone" id="zoneC" onclick="clicZone('C')"></div>
        <div class="zone" id="zoneD" onclick="clicZone('D')"></div>
        <div class="zone" id="zoneE" onclick="clicZone('E')"></div>
        <div class="zone" id="zoneF" onclick="clicZone('F')"></div>
        <div class="zone" id="zoneG" onclick="clicZone('G')"></div>

        <img src="https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpengrenage-1.webp" id="engrenageA" class="engrenage">
        <img src="https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpengrenagegrand.webp" id="engrenageB" class="engrenage">
        <img src="https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpengrenagegrand.webp" id="engrenageC" class="engrenage">
        <img src="https://avelescape.wordpress.com/wp-content/uploads/2026/06/1-webpengrenage-1.webp" id="engrenageD" class="engrenage">

        <div id="message">Touchez les éléments du mécanisme.</div>
    </div>
</div>

<script>
const bonCode = "DABCG";
let saisie = "";
let mecanismeLance = false;

function clicZone(valeur){
    if(mecanismeLance) return;
    saisie += valeur;
    document.getElementById("message").innerHTML = "Séquence : " + saisie;

    if(!bonCode.startsWith(saisie)){
        document.getElementById("message").innerHTML = "❌ Mauvais ordre";
        saisie = "";
        return;
    }

    if(saisie === bonCode){
        lancerMecanisme();
    }
}

function lancerMecanisme(){
    mecanismeLance = true;
    document.getElementById("engrenageA").classList.add("tourneDroite");
    document.getElementById("engrenageB").classList.add("tourneGauche");
    document.getElementById("engrenageC").classList.add("tourneDroite");
    document.getElementById("engrenageD").classList.add("tourneGauche");
    document.getElementById("message").innerHTML = "✅ Les engrenages du phare s'enclenchent";
}
</script>

</body>
</html>
