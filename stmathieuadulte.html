<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2a0a10">
<title>Le Mystère du Phare</title>

<style>
* { box-sizing: border-box; }

:root {
  --rouge-cardinal: #0f0001;
  --cramoisi: #380508;
  --or: #D4AF37;
  --ivoire: #F5E8D0;
  --nuit-rouge: #231619;
}

body {
  margin: 0;
  font-family: Georgia, serif;
  background: var(--nuit-rouge);
  color: var(--ivoire);
  overflow-x: hidden;
}

.bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, var(--rouge-cardinal) 0%, var(--nuit-rouge) 70%);
  z-index: -1;
}

.progress-bar {
  position: fixed;
  top: env(safe-area-inset-top, 0px);
  left: 0;
  height: 5px;
  background: var(--or);
  transition: width 0.4s ease;
  z-index: 10;
}

.screen {
  display: none;
  min-height: 100vh;
  padding: 40px 20px;
  text-align: center;
}

.screen.active {
  display: block;
}

.nav-back {
  position: fixed;
  top: max(15px, env(safe-area-inset-top));
  left: max(15px, env(safe-area-inset-left));
  display: none;
  z-index: 20;
  background: rgba(42, 10, 16, 0.85);
  color: var(--ivoire);
  border: 1px solid var(--or);
  border-radius: 50%;
  width: 45px;
  height: 45px;
  font-size: 24px;
  cursor: pointer;
}

.nav-back.visible {
  display: block;
}

.btn-primary,
button {
  margin: 12px;
  padding: 14px 22px;
  background: var(--rouge-cardinal);
  color: var(--ivoire);
  border: 1px solid var(--or);
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  font-family: Georgia, serif;
  box-shadow: 0 0 12px rgba(212, 175, 55, 0.25);
}

.btn-primary:hover,
button:hover {
  background: var(--cramoisi);
}

.intro-img,
.lettre-img,
.missive1-image,
.missive2-image,
.chapter-img,
.abbaye-img,
.moineloin-img,
.puzzle-result-img {
  max-width: 90%;
  max-height: 60vh;
  cursor: pointer;
}

.puzzle-result-img {
  display: block;
  margin: 20px auto;
  cursor: default;
}

.intro-title {
  font-size: clamp(26px, 10vw, 48px);
  margin: 20px 0;
  color: var(--ivoire);
  text-shadow: 0 0 12px rgba(212, 175, 55, 0.35);
}

.intro-date,
.intro-location {
  color: var(--or);
}
